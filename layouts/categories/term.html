{{ define "main" }}
<div class="container" style="max-width: 800px; margin: 60px auto; padding: 0 20px;">
    <h1 style="font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 8px;">
        {{ .Title }}
    </h1>

    {{ with .Description }}
    <div class="category-description" style="font-size: 15px; color: var(--secondary); margin-bottom: 30px; line-height: 1.6; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
        {{ . | markdownify }}
    </div>
    {{ else }}
    <div style="border-bottom: 1px solid var(--border); margin-bottom: 30px;"></div>
    {{ end }}

    <ul class="list" style="list-style: none; padding: 0; margin: 0;">
        {{ range .Pages }}
        <li style="margin-bottom: 25px; list-style: none !important;">
            <a href="{{ .Permalink }}" 
               style="display: flex; align-items: baseline; text-decoration: none; transition: all 0.25s ease;"
               onmouseover="this.querySelector('.post-title').style.color='#007aff'; this.querySelector('.post-title').style.textDecoration='underline';" 
               onmouseout="this.querySelector('.post-title').style.color='var(--primary)'; this.querySelector('.post-title').style.textDecoration='none';"
            >
                <span style="font-size: 14px; color: var(--secondary); font-family: monospace; min-width: 100px; flex-shrink: 0;">
                    {{ .Date.Format "2006-01-02" }}
                </span>
                
                <span class="post-title" style="font-size: 18px; color: var(--primary); font-weight: 500; transition: all 0.2s ease;">
                    {{ .Title }}
                </span>
            </a>
        </li>
        {{ end }}
    </ul>
</div>
{{ end }}
