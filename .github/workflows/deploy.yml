name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
      - name: Install blogdown
        run: Rscript -e 'install.packages("blogdown")'
      - name: Install Hugo
        run: Rscript -e 'blogdown::install_hugo(version = "0.160.1", extended = TRUE)'
      - name: Build site
        run: Rscript -e 'blogdown::build_site()'
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: zhiming-chen/zhiming-chen.github.io
          publish_branch: master
          publish_dir: ./public
          keep_files: false